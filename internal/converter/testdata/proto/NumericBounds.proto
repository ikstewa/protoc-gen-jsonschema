syntax = "proto3";
package samples;

message NumericBounds {
    int32 int32_val       = 1;
    sint32 sint32_val     = 2;
    sfixed32 sfixed32_val = 3;
    uint32 uint32_val     = 4;
    fixed32 fixed32_val   = 5;
    int64 int64_val       = 6;
    sint64 sint64_val     = 7;
    sfixed64 sfixed64_val = 8;
    uint64 uint64_val     = 9;
    fixed64 fixed64_val   = 10;
    float float_val       = 11;
    double double_val     = 12;
}
